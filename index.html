<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Jarvis</title>

<style>
body {
  background: #0a0a0a;
  color: #e8e8e8;
  font-family: sans-serif;
  display: flex;
  flex-direction: column;
  height: 100vh;
  margin: 0;
}

#chat {
  flex: 1;
  overflow-y: auto;
  padding: 15px;
}

.msg {
  margin: 8px 0;
  padding: 10px;
  border-radius: 10px;
  max-width: 80%;
}

.user { background: #003322; margin-left: auto; }
.ai { background: #1a1a1a; }

#bottom {
  display: flex;
  padding: 10px;
  border-top: 1px solid #333;
}

textarea {
  flex: 1;
  padding: 10px;
  background: #111;
  color: white;
  border: none;
}

button {
  padding: 10px;
  margin-left: 5px;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="chat"></div>

<div id="bottom">
  <textarea id="input"></textarea>
  <button onclick="send()">Send</button>
  <button onclick="voice()">🎤</button>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");

// add message
function add(role, text) {
  const div = document.createElement("div");
  div.className = "msg " + role;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

// typing effect
function typeText(text, callback) {
  let i = 0;
  const div = document.createElement("div");
  div.className = "msg ai";
  chat.appendChild(div);

  const interval = setInterval(() => {
    div.textContent += text[i];
    i++;
    chat.scrollTop = chat.scrollHeight;

    if (i >= text.length) {
      clearInterval(interval);
      callback && callback();
    }
  }, 15);
}

// send message
async function send() {
  const text = input.value.trim();
  if (!text) return;

  input.value = "";
  add("user", text);

  try {
    const res = await fetch("https://jarvis-ai-0typ.onrender.com/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text })
    });

    const data = await res.json();
    typeText(data.reply);

  } catch (err) {
    add("ai", "Error: " + err.message);
  }
}

// enter key
input.addEventListener("keydown", e => {
  if (e.key === "Enter") {
    e.preventDefault();
    send();
  }
});

// 🎤 voice input
function voice() {
  const SpeechRecognition =
    window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SpeechRecognition) {
    alert("Voice not supported");
    return;
  }

  const rec = new SpeechRecognition();
  rec.start();

  rec.onresult = e => {
    const text = e.results[0][0].transcript;
    input.value = text;
    send();
  };
}
</script>

</body>
</html>
